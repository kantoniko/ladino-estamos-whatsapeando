titulo: En este tyempo - Adi 28
pub: 2026.06.14
source: https://ladinokomunita.groups.io/g/main/message/76059

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 28.
    ebreo: עדי 28.
  - ladino: 7 de oktobre 2023, 6.29 de la demanyana. En Toronto esta 11.29 de la medya noche. En supito la aplikasyon "Kolor Korolado" en el telefon de Jackie esta "echando chiyos". Esta aplikasyon empesa a "gritar" kuando ay alarmes en Israel. Jackie salto de la kama. Atyo, kualo esta afitando??
    ebreo: 7 באוקטובר 2023, 6.29 בבוקר. בטורונטו השעה 11.29 של אמצע לילה. פתאום האפליקציה "צבע אדום" בטלפון של ג'אקי "צורחת צרחות". אפליקציה זו מתחילה "לצעוק" כשיש אזעקות בישראל. ג'אקי קפצה מהמיטה. אלוהים, מה קורה??
  - ladino: Se metyo en kontakto kon la famiya demandando kualo esta akontesyendo en Israel.
    ebreo: יצרה קשר עם המשפחה לשאול מה מתרחש בישראל.
  - ladino: Si el trueno grita, la tempesta se aserka.
    ebreo: אם הרעם צועק הסופה מתקרבת.

