titulo: En este tyempo - Adi 29
pub: 2026.06.16
source: https://ladinokomunita.groups.io/g/main/message/76074

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 29.
    ebreo: עדי 29.
  - ladino: Las alarmes en kibuts Holit, estan de azer sodros. Yaron se alevanto  de la kama, se aparo de la puerta i vido syenes de misiles en los syelos ke estan vinyendo de la direksyon de Gazza. "Bum"es de todas las vandas. Misiles de Hamas por una vanda, kontramisiles de Israel por la otra vanda. El dia dainda no se aklaro i el syelo esta yeno de "relumbres" ke estan syegando los ojos.
    ebreo: האזעקות בקיבוץ חולית מחרישות אוזניים. ירון קם מהמיטה, ניצב בדלת וראה מאות טילים בשמיים שמגיעים מכיוון עזה. "בומים" בכל כיוון. טילים של חמס מצד אחד, מיירטים של ישראל מצד שני. היום עדיין לא התבהר והשמיים מלא "הבזקים" שמעוורים את העיניים.
  - ladino: Bueno, esto ya afita de vez en kuando. Los del Hamas tiran unos kuantos misiles, el evento kontinua 10-15 puntos i se eskapa. Oy, parese no va aver mas durmir.
    ebreo: טוב, זה קורה מדי פעם. אלה מחמס יורים מספר טילים, האירוע נמשך 10-15 דקות ומסתיים. היום כנראה אין יותר לישון.
  - ladino: Yaron entro a la kamareta de de Abrigo.
    ebreo: ירון נכנס לממ"ד.
  - ladino: No ay mas sodro del ken no kere oyir, no ay mas syego del ken no kere ver.
    ebreo: אין יותר חרש ממי שלא רוצה לשמוע, אין יותר עיוור ממי שלא רוצה לראות.


