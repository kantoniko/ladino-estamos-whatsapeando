titulo: Akel tyempo - Espiones djudyos 57
pub: 2026.03.22
source: https://ladinokomunita.groups.io/g/main/message/75611

teksto:
  - ladino: Akel tyempo.
    ebreo: בזמנים ההם.
  - ladino: Espiones djudyos 57.
    ebreo: מרגלים יהודים 57.
  - ladino: Los otros kuatro shoferes arivaron a sus destino sanoz i rezyos i deskargaron los depos de los kamyones.
    ebreo: ארבע הנהגים האחרים הגיעו ליעדם בריאים ושלמים, פרקו את המחסנים מהמשאיות.
  - ladino: En 31 de mayo la noche, se avriyo en Kiev Ukraina la Sala de Komandamyento, kon todos los komandantes grandes de la armada. En el 1 de djunyo, a las 5.00 de la demanyana, se dyo de akeya sala el orden de empesar la operasyon "Tiralanya".
    ebreo: ב- 31 במאי בלילה, נפתח בקייב אוקריינה, אולם (חדר) הפיקוד, עם כל המפקדים הבכירים של הצבא. ב-1 ליוני, בשעה 5.00 בבוקר, נתנה מאותו חדר הפקודה להתחיל במבצע "קורי עכביש".
  - ladino: La sevoya de la manyana kometela tu, la del mediodia dala a tu amigo i la de la noche a tu inimigo.
    ebreo: את הבצל של הבוקר תוכל אתה, של הצהריים תן לחברך ושל הלילה תן לאויב שלך.

