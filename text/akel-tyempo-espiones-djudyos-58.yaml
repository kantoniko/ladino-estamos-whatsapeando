titulo: Akel tyempo - Espiones djudyos 58
pub: 2026.03.24
source: https://ladinokomunita.groups.io/g/main/message/75623

teksto:
  - ladino: Akel tyempo.
    ebreo: בזמנים ההם.
  - ladino: Espiones djudyos 58.
    ebreo: מרגלים יהודים 58.
  - ladino: Los depos de Artem i Katya teniyan Techo Doblado. En supito se avriyeron los techos de los depos, se alsaron 117 drones al aver i empesaron a bolarsen a direksyones de kuatro bazas de las fuersas aereas sovyetikas. Olenya en la rijyon Murmansk, Ivanova en la rijyon Ivanova, Dyagilevo en la rijyon Aryazan i Belaya en la rijyon Irkutsk. Los drones destruyeron en tyerra 41 aviyones bombarderos rusos Topolev, de los tipos A-50, Tu-95, Tu-22M3 i-Tu-160.
    ebreo: למחסנים של ארטם וקטיה היו גגות כפולים. פתאום נפתחו הגגות של המחסנים, התרוממו 117 כטב"מים לאוויר והתחילו לעוף בכיוונים של 4 בסיסי חיל האויר הסובייטי. אולניה באיזור מורמנסק, איוונובה באיזור איוונובה, דיאגילבו באיזור אריאזן ובלאיה באיזור אירקוטסק. הכתב"מים החריבו 41 מטוסים מפציצים רוסיים טופולב, מהסוג A-50, Tu-95, Tu-22M3 , ו- Tu-160.
  - ladino: Los rusos se mareyaron i no entendyeron de ande les vino esta bela en la kavesa.
    ebreo: הרוסים התבלבלו ולא הבינו מאיפה באה הצרה הזו על ראשם.
  - ladino: Artem i Katya se desparesyeron en la frontyera de Kazahistan.
    ebreo: ארטם וקטיה נעלמו בגבול קזאחיסטן.
  - ladino: Esto es bela kon tanyedores.
    ebreo: זו צרה עם נגנים.
