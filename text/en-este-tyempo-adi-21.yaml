titulo: En este tyempo - Adi 21
pub: 2026.05.28
source: https://ladinokomunita.groups.io/g/main/message/75980

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 21.
    ebreo: עדי 21.
  - ladino: Komo ya se save, en el 7 de oktobre estava programado un festival muzikal grande, yamado "Nova", en un kampo grande serka del kibuts Reim. A este festival se asperavan kaji 3000 partisipantes.
    ebreo: כידוע, ל- 7 לאוקטובר היה מתוכנן פסטיבל מוזיקלי גדול הקרוי "נובה", בשדה גדול קרוב מאוד לקיבוץ רעים. לפסטיבל הזה היו צפויים להגיע כ- 3000 משתתפים.
  - ladino: Aparte de esto, aviya un "Grupo serrado" de mansevos ke uzavan a organizar, una ves en dos mezes, un otro festival de muzika, yamado "Psyduck". El dia egzakto i el luguar se publikavan unos dos dias antes del evento entre los miembros del grupo. Este uzo ya estava kontinuando kaji 5 anyos.
    ebreo: חוץ מזה, הייתה "קבוצה וסגורה" של צעירים שנהגו לארגן, פעם בחודשיים, פסטיבל אחר של מוזיקה הקרוי "פסיידוק". היום המדוייק והמקום היו מתפרסמים יום יומיים לפני האירוע בין חברי הקבוצה. הנוהג הזה נמשך כבר כ-5 שנים...
  - ladino: El dyo tyene kargo i de la ormiga i del kampo.
    ebreo: אלוהים דואג גם לנמלה וגם לשדה.

