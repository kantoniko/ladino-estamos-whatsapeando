titulo: En este tyempo - Adi 14
pub: 2026.05.12
source: https://ladinokomunita.groups.io/g/main/message/75881

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 14.
    ebreo: עדי 14.
  - ladino: Adi i Anani pasaron a bivir endjuntos i lavorar muy duro. Anani estava en los verdjeles de limones, portokales, abukado i mas. Adi se estava okupando de todos los espektos sosyales. Era miembra de la komite ke egzeminava kandidates muevos ke keren bivir en el kibuts i desidava a akseptarlos o no. Aperte de los lavoros del kibuts Adi lavorava de kaza en el kampo de seguridad sibernetika.
    ebreo: עדי וענני עברו לגור ביחד ולעבוד קשה מאוד. ענני היה בפרדסים של הלימונים, תפוזים, אבוקדו ועוד. עדי טיפלה בכל האספקטים החברתיים. הייתה חברה בוועדה שבדקה מועמדים חדשים שרוצים לחיות בקיבוץ והחליטה לקבלם או לא. בצד העבודות של הקיבוץ עדי עבדה מהבית בשטח (בתחום) אבטחת סייבר.
  - ladino: En 2013 Adi Vital i Anani Kaplun se kazaron. En el empesijo desidaron de no trayer kriaturas i lavorar kon todas sus fuersas.
    ebreo: ב- 2013 עדי ויטל וענני קפלון התחתנו. בהתחלה החליטו שלא להביא ילדים ולעבוד בכל כוחותיהם.
  - ladino: Mas da el duro ke el desmudo.
    ebreo: יותר נותן הקשה מאשר הערום.


