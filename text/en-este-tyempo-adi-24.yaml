titulo: En este tyempo - Adi 24
pub: 2026.06.04
source: https://ladinokomunita.groups.io/g/main/message/75996

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 24.
    ebreo: עדי 24.
  - ladino: 6 de 0ktobre 2023 era dia de vyernes. Jackie estava en Toronto Kanada, vijitando sus paryentes. Iva tornar a Israel en el 8 de oktobre. Yaron estava solo, en Yerushalayim. Adi le telefono a su padre dizyendo ke amanyana es shabat, dia de "Simhat Tora". Ke venga oy a kibuts Holit, i ke tambien la va a envitar a su ermana Ayala del kibuts Kisufim, i "Pasamoz esta noche de shabat komyendo todos endjuntos. Amanyana selebramoz la fiesta de simhat Tora i dospues puedes tornar a Yerushalayim".
    ebreo: 6 באוקטובר 2023 היה יום שישי. ג'אקי הייתה בטורונטו קנדה, מבקרת את משפחתה. הייתה צריכה לחזור לישראל ב- 8 לאוקטובר. ירון היה לבד בירושלים. עדי התקשרה לאביה באומרה שמחר יום שבת, יום "שימחת תורה". שיבוא היום לקיבוץ חולית, ושתזמין גם את אחותה איילה מקיבוץ כיסופים, ו- "נעבור את ערב שבת בארוחה כולנו יחד. מחר נחגוג את חג שימחת תורה ולאחר מכן תוכל לחזור לירושלים".
  - ladino: '"Bueno" disho Yaron "muy buena idea" i salyo al kamino.'
    ebreo: '"טוב" אמר ירון "רעיון טוב מאוד" ויצא לדרך.'
  - ladino: Un lenyiko solo no ensyende.
    ebreo: בול עץ אחד לבד לא נדלק.


