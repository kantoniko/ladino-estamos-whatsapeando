titulo: En este tyempo - Adi 32
pub: 2026.06.23
source: https://ladinokomunita.groups.io/g/main/message/76118

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 32.
    ebreo: עדי 32.
  - ladino: Anani, Ahuvya i sus grupo de trenta mansevos estan en los kampos serka de kibuts Nirim. En este festival de natura, Psyduck, ay kaji 70-100 personas.
    ebreo: ענני, אהוביה והקבוצה שלהם של 30 צעירים נמצאים בשדות ליד קיבוץ נירים. בפסטיבל טבע זה, פסיידק, יש כ- 70 אנשים.
  - ladino: La muzika se areto en uno. No ay luguar de Abrigo en el kampo. Kada uno de eyos estan mirando komo eskondersen, estirarsen enbasho, tapar la kavesa kon las manos i asperar ke pase esta mala ora.
    ebreo: המוזיקה נעצרה בבת אחת. אין מגונית בשדה. כל אחד מסתכל איך להתחבא, להשתרע על הארץ, לכסות את הראש עם הידיים, ולחכות שתעבור השעה הקשה.
  - ladino: Anani i Ahuvya empesaron a komunikar kon las famiyas en kibuts Holit, en kibuts Kisufim, en Yerushalayim, en Toronto.
    ebreo: ענני ואהוביה התחילו להתקשר עם המשפחות בקיבוץ חולית, בקיבוץ כיסופים, בירושלים, בטורונטו.
  - ladino: 'Todos estan enfuersando, el uno al otro. "No voz estrecheyes, todo va pasar en 10-15 minutos."'
    ebreo: 'כולם מחזקים אחד את השני.. "אל תילחצו, הכל יעבור תוך 10-15 דקות".'
  - ladino: Del Dio i del vizino no se puede eskonder.
    ebreo: מאלוהים ומהשכן אי אפשר להתחבא.





