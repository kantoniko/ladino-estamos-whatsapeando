titulo: En este tyempo - Adi 34
pub: 2026.06.28
source: https://ladinokomunita.groups.io/g/main/message/76151

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 34.
    ebreo: עדי 34.
  - ladino: Yaron torno a la Kamareta de Abrigo, serro la puerta, lo ato al "negromazal" de mango ke no se kere enkavenar, kon kuedra a la sistema de vantilasyon ariva, metyo siya debasho del mango para ke no se pueda aboltar i se preparo a fuyir de la ventana si los teroristos van a desbrochar la puerta. Agora no ay maz avlar kon el telefon, ke no se oygan las bozes. Solo komunikar kon mesajes sin kitar bruido. La ora esta 7:15 de la demanyana. Deke la armada israelyana no esta vinyendo???
    ebreo: ירון חזר לממ"ד, סגר את הדלת, קשר את "מזל רע" (מקולל) של הידית שלא רוצה להינעל, עם חבל למערכת האוורור למעלה, שם כיסא מתחת לידית בכדי שלא תוכל להסתובב והתכונן לברוח מהחלון אם הטרוריסטים יפרצו את הדלת. עכשיו אין יותר לדבר בטלפון, שלא ישמעו את הקולות. רק להיות בקשר במסרונים בלי להרעיש. השעה 7:15 בבוקר. מדוע הצבא הישראלי לא מגיע???
  - ladino: Kon la kuchara le da el arroz, kon el mango le kita los ojos.
    ebreo: עם הכפית נותן לו אורז עם הידית מוציא לו את העיניים.


