titulo: En este tyempo - Adi 12
pub: 2026.05.08
source: https://ladinokomunita.groups.io/g/main/message/75850

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 12.
    ebreo: עדי 12.
  - ladino: Kibuts Holit es alokado 2 kilometros de la frontyera de Gazza. Orijinalmente el kibuts fue establesido en 1975 en la peninsula Sinay, al lado de la sivdad djudia Yamit i serka de la sivdad araba Rafiah. En rezulto del akodro de paz entre ejipto i Israel el kibuts fue transferado al bodre de Gazza. En el anyo 2011 la situasyon del kibutz Holit estava terivle. Munchos lo abandonaron. Kedaron mas poko de 30 miembros. Ekonomikamente ya se estava "batireando".
    ebreo: קיבוץ חולית ממוקם 2 ק"מ מגבול עזה. במקור הקיבוץ הוקם ב- 1975 בחצי האי סיני, ליד העיר היהודית ימית וקרוב לעיר ערבית רפיח. כתוצאה מהסכם השלום בין מצריים לישראל הקיבוץ הועבר לעוטף עזה. בשנת 2011 המצב של קיבוץ חולית היה איום. רבים עזבו אותו. נשארו פחות מ- 30 חברים. מבחינה כלכלית עמד "לטבוע".
  - ladino: Un buen pleto traye un buen paz.
    ebreo: ריב טוב מביא לשלום טוב.
