titulo: En este tyempo - Adi 20
pub: 2026.05.26
source: https://ladinokomunita.groups.io/g/main/message/75968

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 20.
    ebreo: עדי 20.
  - ladino: Al lado de Avital morava el mansevo Dr. Hayim Katsman. Hayim nasyo en la sivdad Petah Tikva en 1991 a un par ke izo aliya de los estados Unidos un anyo antes. En el servisyo militar era soldado kombatyente. Katsman obtuvo el primer grado en filosofia i siensyas politikas de la Universita Avyerta, maestria en siensyas politikas de la Universidad Ben-Gurion i doktorato de la Universidad de Washington en Seattle. Era mekaniko de otomobiles i bahchivan en Holit, profesor en el Sentro Akademiko Multidisiplinario de Yerushalayim i DJ de muzika araba en fiestas, porke pensava ke la kultura puede aunir a las personas.
    ebreo: ליד אביטל גר הצעיר ד"ר חיים כצמן. חיים נולד בעיר פתח תקוה ב- 1991 לזוג שעשה עליה מארה"ב שנה קודם. בשירותו הצבאי היה חייל קרבי. כצמן קיבל את התואר הראשון בפילוזופיה ומדעי המדינה מהאוניברסיטה הפתוחה, מסטר במדעי המדינה מאוניברסיטת בן גוריון ותואר דוקטור מאוניברסיטת וואשינגטון בסיאטל. היה מכונאי רכב וגנן בחולית, פרופסור במרכז האקדמי הבין תחומי בירושלים ו-  DJשל מוזיקה ערבית במסיבות, כי חשב שהתרבות יכולה לאחד את האנשים.
  - ladino: Kuando no ay mazal, ya se ve del dia de naser.
    ebreo: כשאין מזל, רואים מיום הלידה.

