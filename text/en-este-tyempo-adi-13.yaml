titulo: En este tyempo - Adi 13
pub: 2026.05.10
source: https://ladinokomunita.groups.io/g/main/message/75871

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 13.
    ebreo: עדי 13.
  - ladino: El grupo muestro del "Grano de Kooperadores" desidaron de instlarsen en kibuts Holit i azer un revolvimyento. Una parte de eyos, entre eyos Adi, estavan por terminar el servisyo militar i los otros apenas terminaron. Este modo vinyeron los 10 mansevos a Holit, dublaron las mangas, empesaron a lavorar duro i lo salvaron de fayitar.
    ebreo: הקבוצה שלנו של (גרעין השותפות) החליטה להתיישב בקיבוץ חולית ולעשות מהפכה. חלקם, ביניהם עדי, עמדו לסיים את השירות הצבאי והאחרים זה עתה סיימו. כך הגיעו 10 צעירים לחולית, קיפלו את השרוולים, התחילו לעבוד קשה והיצילו אותו מפשיטת רגל.
  - ladino: Kuzido empesado es medyo eskapado.
    ebreo: התחלה של תפירה היא חצי סיום שלה.

