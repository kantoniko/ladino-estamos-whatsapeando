titulo: Akel tyempo - Espiones djudyos 59
pub: 2026.03.26
source: https://ladinokomunita.groups.io/g/main/message/75649

teksto:
  - ladino: Akel tyempo.
    ebreo: בזמנים ההם.
  - ladino: Espiones djudyos 59.
    ebreo: מרגלים יהודים 59.
  - ladino: "Pasaron unos kuantos dias. Dizen ke Catherine Perez Shakdam torno a Iran, al parser en eskondido. En mizmo tyempo salyeron kamyones a las direksyones de syete sivdades en Iran: Teheran, Tabriz, Hamadan, Kom, Isfahan, Kermanshah i Shiraz."
    ebreo: "עברו מספר ימים. אומרים שקטרין פרז שקדאם חזרה לאירן, כנראה בהסתר. באותו הזמן יצאו משאיות לכיוונים של שבע ערים באירן: טהרן, טבריז, חמאדאן, קום, איספהאן, קרמנשאה ושירז."
  - ladino: 12 de djunyo la noche. Se avriyo en Israel la Sala de Komandamyento, kon todos los komandantes grandes de la armada. 13 de djunyo 2025 a las 4.44 de la demanyana, se dyo de esta sala el orden de empesar la gerra "Puevlo Komo Leon".
    ebreo: 12 ליוני בלילה. נפתח בישראל אולם (חדר) פיקוד עם כל המפקדים הבכירים של הצבא. 13 ביוני 2025 ב- 4.44 של הבוקר, נתנה בחדר זה הפקודה להתחיל את המלחמה "עם כלביא".
  - ladino: Nada non keda eskondido debasho del sielo.
    ebreo: שום דבר לא נשאר מוסתר תחת השמיים.
