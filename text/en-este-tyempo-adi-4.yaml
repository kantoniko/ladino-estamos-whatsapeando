titulo: En este tyempo - Adi 4
pub: 2026.04.19
source: https://ladinokomunita.groups.io/g/main/message/75734

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 4.
    ebreo: עדי 4.
  - ladino: Jackie es nasida de Ottawa, Kanada. Kuando teniya 18 anyos la famiya pasaron a Toronto. Emprimero vino a Israel komo parte de un projekto de interkambyo estudental i konosyo a Yaron. Izo Aliya en 1976 i se kazaron en 1980. En el empesijo teniyan difikultad de trayer kriyaturas al mundo. Se fueron a Kanada i adoptaron una ijika, en un proseso ke se yama "Adoptamyento Avyerto". La yamaron Liat. Oy Liat es kazada i mora en la sivdad Modiin. Lavora en una kompania de teknolojiya alta.
    ebreo: ג'אקי נולדה באוטווה, קנדה. כשהייתה בת 18 המשפחה עברה לטורונטו. תחילה באה לישראל כחלק מפרויקט של חילופי סטודנטים והכירה את ירון. עשתה עליה ב 1976 והתחתנו ב- 1980. בהתחלה היו להם קשיים להביא ילדים לעולם. הלכו לקנדה ואימצו ילדה בתהליך שנקרא "אימוץ פתוח". קראו לה ליאת. היום ליאת נשואה וגרה בעיר מודיעין. עובדת בחברת היי טק.
  - ladino: Para konoser bien al ombre kale komer kon el una mezura de sal.
    ebreo: בכדי להכיר את האדם צריך לאכול איתו מידה של מלח.
