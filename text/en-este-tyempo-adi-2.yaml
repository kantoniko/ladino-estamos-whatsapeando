titulo: En este tyempo - Adi 2
pub: 2026.04.14
source: https://ladinokomunita.groups.io/g/main/message/75718

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 2.
    ebreo: עדי 2.
  - ladino: Esta modo empeso la "Gerra del 7 de Oktobre" ke esta kontinuando asta oy, dos anyos i medyo. La fin no esta en la vista. Mas de 2,400 israelyanos muryeron, mas de 20,000 israelyanos estan firidos, munchos fueron kemados bivos, munchos fueron kuchiyados i degoyados, mujeres fueron vyoladas, miles de kazas i de otomobiles fueron kemados, syenes de kazas i otomobiles fueron destruidos por misiles, syenes de miles de personas, famiyas kon kriyaturas i aedados, fueron ovligados de abandonar sus kazas, 254 personas i una kavesa kortada fueron arrevatados. La kavesa kortada dainda no torno de Gazza.
    ebreo: כך התחילה "המלחמת של 7 לאוקטובר" שממשיכה עד עכשיו, שנתיים וחצי. הסוף לא נראה לעין. יותר מ-2400 ישראלים מתו, יותר מ-20000 ישראלים פצועים, רבים נשרפו חיים, רבים נדקרו ונשחטו, נשים נאנסו, אלפי בתים ומכוניות נשרפו, מאות בתים ומכוניות נהרסו מטילים, מאות אלפי אנשים, משפחות עם ילדים וזקנים, נאלצו לנטוש את בתיהם, 254 אנשים וראש ערוף אחד נחטפו. הראש הערוף טרם חזר מעזה.
  - ladino: Azete a la una kon el diavlo fin a ke pasas el kupri.
    ebreo: תתאחד (תתחבר) עם השטן עד שאתה עובר את הגשר.

