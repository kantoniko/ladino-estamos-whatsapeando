titulo: Akel tyempo - Espiones djudyos 46
pub: 2026.02.24
source: https://ladinokomunita.groups.io/g/main/message/75471

teksto:
  - ladino: Akel tyempo.
    ebreo: בזמנים ההם.
  - ladino: Espiones djudyos 46.
    ebreo: מרגלים יהודים 46.
  - ladino: Catherine Perez nasyo en 1982, en Paris, a una famiya djudiya sefaradiya. Su nono de un lado era un luchador partizano i su nono del otro lado era sovrebivyente del Holokosto. A los 11 anyos, peryo a su madre i fue enviada a estudiar a un prestijyozo internado. A los 17 anyos ayego a Londra para estudyar komunikasion, finansayon i psikolojia. Dospues de graduarse, empeso a lavorar en Wikistrat (una kompania israelyana de analiz geopolitik). Gano eksperiensia en analizando los paizes del Oriente Medio, el terorizmo islamiko i las dinamikas de poder en la rijyon.
    ebreo: קטרין פרז נולדה ב- 1982, בפריז, למשפחה יהודיה ספרדיה. סבה מצד אחד היה לוחם פרטיזני וסבה מצד שני היה ניצול שואה. בגיל 11, איבדה את אמא שלה ונשלחה ללמוד לפנימייה יוקרתית. בגיל 17 הגיעה ללונדון בכדי ללמוד תקשורת, מימון ופסיכולוגיה. לאחר שסיימה את לימודיה, התחילה לעבוד ב- ויקיסטרט (חברה ישראלית לניתוח גיאופוליטי). רכשה ניסיון בניתוחה את המדינות של מזרח התיכון, בטרוריזם איסלמי ובדינמיקות של כוח באיזור.
  - ladino: Si el poder era komo el kerer.
    ebreo: אילו היכולת/הכוח היה כמו הרצון.

