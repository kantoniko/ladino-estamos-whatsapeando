titulo: En este tyempo - Adi 23
pub: 2026.06.02
source: https://ladinokomunita.groups.io/g/main/message/75997

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 23.
    ebreo: עדי 23.
  - ladino: Anani ere miembro del grupo de seguridad en el kibuts. Este grupo era enkargado de todos los espektos de seguridad i emerjensiya. El koordinador del grupo era Avraham Korin. la mano derecha de Avraham i el shef del ekipo de emerjensiya era Shimon Azulay (Kish). Todos los miembros del grupu eran armados. Anani teniya en su dispozisyon un tiro M16 i un revolver, serrados en kaza, aryentro de una kasha.
    ebreo: ענני היה חבר בקבוצת ביטחון (כיתת כוננות) בקיבוץ. הקבוצה הזו הייתה אחראית על כל ההיבטים של הביטחון וחרום. הרבש"ץ היה אברהם קורין. יד ימינו של אברהם וראש קבוצת (צוות) חרום היה שמעון אזולאי (קיש). כל חברי הקבוצה היו חמושים. לענני היו ברשותו רובה  M16ואקדח, סגורים בבית, בתוך כספת.
  - ladino: Kuando los teroristos de Gazza tiravan misiles, los miembros del kibuts teniyan solo 7 segundos de tyempo, desde el sonido del alarm asta la kayida de los misiles, para organizarsen i kalkularsen sus pasos.
    ebreo: כאשר הטרוריסטים מעזה ירו טילים, לחברי הקיבוץ היו רק 7 שניות של זמן, מהישמע קול האזעקה עד לנפילת הטילים, בכדי להתארגן ולחשב את צעדיהם.
  - ladino: La verdad kamina kon pasos chikos ma arriva al tyempo djusto.
    ebreo: האמת מתקדמת בצעדים קטנים אך מגיעה בדיוק בזמן.


