titulo: Kurso de Judeo-Epsanyol - dialogo 2
pub: "2018.08.01 13:22"
source: WhatsApp

teksto:
  - ladino: "Dora: Bunos dias. Komo te yamas?"
    ebreo: ימים טובים/יום טוב/בוקר טוב. איך קוראים לך?
  - ladino: "Davut: Me yamo Davut. I tu? Komo te yamas?"
    ebreo: שמי דווד. ואיך קוראים לך?
  - ladino: "Dora: Me yamo Dora. Tu sos estudiante aki?"
    ebreo: שמי דורה. אתה תלמיד כאן?
  - ladino: "Davut: No, yo lavoro aki."
    ebreo: לא אני עובד כאן.
  - ladino: "Dora: Ke azes?"
    ebreo: מה אתה עושה?
  - ladino: "Davut: So kontabl. I tu, ke azes?"
    ebreo: אני מנהל חשבונות. ואת מה את עושה?
  - ladino:  "Dora: Yo so profesora de ingles."
    ebreo: אני פרופסורית לאנגלית.
  - ladino: "Davut: A, muy bueno. Lavoras kada dia?"
    ebreo: אה, טוב מאוד. את עובדת כל יום?
  - ladino: "Dora: No, lavoro solo 3 dias a la semana. I tu?"
    ebreo: לא אני עובדת רק 3 ימים בשבוע. ואתה?
  - ladino: "Davut: Yo lavoro kada dia."
    ebreo: אני עובד כל יום.


