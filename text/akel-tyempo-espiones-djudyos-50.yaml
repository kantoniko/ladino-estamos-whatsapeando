titulo: Akel tyempo - Espiones djudyos 50
pub: 2026.03.05
source: https://ladinokomunita.groups.io/g/main/message/75517

teksto:
  - ladino: Akel tyempo.
    ebreo: בזמנים ההם.
  - ladino: Espiones djudyos 50.
    ebreo: מרגלים יהודים 50.
  - ladino: Catherine izo de Teheran su sigundo ogar. La tomaron por jurnalista permanente en la Ajensia Iranyana de Nuvedades. Kon el ayudo de Nader Talebzadeh konosyo i Entrevisto a los funksyonaryos los mas importantes del rejim. Al prezidente Raisi (ke esta en los syelos), a Ayatola Alí Khamenei (ke esta en los syelos) a Qassem Soleimani (ke esta en los syelos), a la ija de Imad Mughniyeh (ke esta en los syelos) i mas... Nader Talebzadeh le disho ke Khamenei no se enteresa de mujeres, se enteresa do mansevos minores.
    ebreo: קטרין עשתה (הפכה) את טהרן לביתה השני. לקחו אותה בתור עיתונאית קבועה בסוכנות חדשות אירני. בעזרת נאדר טליבזדה הכירה וראיינה את בעלי התפקידים החשובים ביותר של המשטר. את הנשיא ראיסי (שנמצא בשמיים), את אייטולה עלי חמנאי (שנמצא בשמיים), את קאסם סולימני (שנמצא בשמיים), את ביתו של עימד מואנייה (שנמצא בשמיים) ועוד... נאדר טליבזדה אמר לה שחמנאי לא מתעניין בנשים, מתעניין בצעירים קטינים.
  - ladino: Establesyo kontakto kon toda la elite de Iran i espesyalmente kon las mujeres. Empeso a organizar reunyones de mujeres en las kazas i estudiyo la distribusyon de las kamaretas en kada kaza. Saviya ande es la kamareta de echar en kada kaza i kaza.
    ebreo: ביססה קשר עם האליטה של אירן ובמיוחד עם הנשים. התחילה לארגן אספות נשים בבתים ולמדה את חלוקת החדרים בכל בית. ידעה איפה חדר שינה בכל בית.
  - ladino: En 2021 torno a Ingletyerra.
    ebreo: ב- 2021 חזרה לאנגליה.
  - ladino: Dos mujeres en mizmo ogar, se avlan bien i se keren mal.
    ebreo: שתי נשים באותו בית, מדברות טוב אוהבות רע.
