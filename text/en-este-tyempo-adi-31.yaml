titulo: En este tyempo - Adi 31
pub: 2026.06.21
source: https://ladinokomunita.groups.io/g/main/message/76106

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 31.
    ebreo: עדי 31.
  - ladino: 'Yaron le telefono a Adi: "Ke venga a ayudarte?". Adi le respondyo kon boz alta i desidida: "No te meneyes de tu luguar!! Enkavena el gancho de la puerta del abrigo i eskondete!! Kuando se va a eskapar esto todo, vyenes aki a komer desayuno kon mozotros".'
    ebreo: 'ירון התקשר לעדי: "שאבוא לעזור לך?". עדי ענתה לו בקול רם והחלטי: "אל תזוז ממקומך!! תנעל את הידית של הדלת של הממ"ד ותתחבא!! כשכל זה ייגמר, תבוא לכאן לאכול ארוחת בוקר איתנו".'
  - ladino: Kualo ke le diga Yaron? Ke el gancho de la puerta del abrigo esta bozdeado i no se kere enkavenar? No le disho nada.
    ebreo: מה יגיד לה ירון? שהידית של דלת הממ"ד מקולקלת ולא ננעלת? לא אמר לה כלום.
  - ladino: Boz de puevlo, boz de syelo.
    ebreo: הקול של העם הקול של השמיים.


