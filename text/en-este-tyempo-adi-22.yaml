titulo: En este tyempo - Adi 22
pub: 2026.05.31
source: https://ladinokomunita.groups.io/g/main/message/75987

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 22.
    ebreo: עדי 22.
  - ladino: Serka del 7 de oktobre vino mesaj ke el festival de muzika Psyduck va tomar luguar en el 7 de oktobre tambien, en uno de los kampos al lado de Kibuts Nirim.
    ebreo: קרוב ל- 7 באוקטובר היגע הודעה שפסטיבל המוזיקה פסיידק יתקיים ב- 7 לאוקטובר גם, באחד השדות שליד קיבוץ נירים
  - ladino: Anani i su ermano Ahuvya teniyan un grupo de 30 personas ke uzavan a irsen a este festival. Tomavan kon eyos dezayuno i aziyan piknik en vyendo el amaneser i oyendo la muzika. Se dyeron de akordo te enkontrarsen en el 7 de oktobre a las 4:30 de la madrugada i partir a este luguar ke es 20 puntos de viyaje.
    ebreo: . לענני ואחיו אהוביה הייתה קבוצה של 30 איש שנהגו ללכת לפסטיבל זה. לוקחים איתם ארוחת בוקר ועושים פיקנית בראותם את הזריחה ושומעם מוזיקה. קבעו להיפגש ב- 7 לאוקטובר בשעה 4:30 של השחר ולנסוע למקום הזה שהוא 20 דקות נסיעה...
  - ladino: En kada tyerra su uzo, en kada kaza su kostumbre.
    ebreo: בכל אדמה (ארץ) המנהגים שלה, בכל בית המסורת שלו.


