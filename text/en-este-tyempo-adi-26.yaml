titulo: En este tyempo - Adi 26
pub: 2026.06.09
source: https://ladinokomunita.groups.io/g/main/message/76030

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 26.
    ebreo: עדי 26.
  - ladino: Dospues de komer Adi le disho a su padre ke le aparejaron kama en la kazika de al lado, ke es la "Kaza de Musafires" en el kibuts. "En jeneral no moran en esta kaza dingunos" disho Adi, "Este modo vas a pueder durmir mas trankilo i las kriyaturas no te van a espertar en medyo de la noche. Ya saves ke Eshel dainda esta mamando las noches i te puedes espertar".
    ebreo: אחרי האוכל עדי אמרה לאבא שלה שהכינו לו מיטה בבית שליד, שזה "בית אורחים" בקיבוץ. "בד"כ לא גרים בבית הזה אף אחד" אמרה עדי. "כך תוכל לישון יותר שליו והילדים לא יעירו אותך באמצע לילה. אתה יודע שאשל עדיין יונק בלילות ואתה יכול להתעורר".
  - ladino: '"Bueno" disho Yaron se fue a echar en la "Kaza de Musafires" ke es djusto enfrente de la kaza de Adi, 5-6 metros.'
    ebreo: '"טוב" אמר ירון והלך לישון ב"בית אורחים" שהוא בדיוק ממול לבית של עדי 5-6 מטרים.'
  - ladino: El ke mucho pensa, sin komer se echa.
    ebreo: מי שחושב הרבה הולך לישון בלי לאכול (רעב).


