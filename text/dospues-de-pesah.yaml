titulo: Estamoz Whatsapeando
pub: 2026.03.31
source: https://ladinokomunita.groups.io/g/main/message/75679

teksto:
  - ladino: Keridos amigos,
    ebreo: חברים יקרים,
  - ladino: Dospues de Pesah vamoz a empesar un kuento de "Este Tyempo".
    ebreo: אחרי פסח נתחיל בסיפור מ"הזמן הזה".
  - ladino: Voz auguro mued alegre i feliz kon todos djuntos i endjuntos en el pranso de "Lel Haseder".
    ebreo: אני מאחל לכם מועדים של שימחה ועושר עם כולם יחד ומאוחדים בשולחן של "ליל הסדר".
  - ladino: Sanoz i rezyos ke estesh, sin sar i sin mal. Kon nombre del Dyo todo se va a aklarar.
    ebreo: היו בריאים וחזקים, בלי צער ובלי דברים רעים. בעזרת השם הכל יתבהר.
  - ladino: Entremyentes voz esto mandando una kantika ke voz avra el korason.  💐💐
    ebreo: בינתיים אני שולח לכם שיר שיפתח לכם את הלב. 💐💐
