titulo: En este tyempo - Adi 3
pub: 2026.04.16
source: https://ladinokomunita.groups.io/g/main/message/75725

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 3.
    ebreo: עדי 3.
  - ladino: Yaron es uno de mis amigos serkanos. Moz aunamos a lo manko una vez en la semana en "Kafe Mula" Yerushalayim para azer sohbet. El, yo i otros 4 amigos. Este reunyon se yama en Israel "Parlamento". Asigun los meoyos muestros es ke "dirijamoz i enderechamoz" el mundo entero.
    ebreo: ירון הוא אחד מחבריי הקרובים. מתאחדים (נפגשים) לפחות פעם בשבוע ב"קפה מולה" ירושלים בכדי לשוחח. הוא ועוד 4 חברים. המפגש הזה נקרא בישראל "פרלמנט". על פי המוח שלנו (הבנתנו) אנחנו " מנהלים ומסדרים" את העולם כולו.
  - ladino: Yaron es muy sempatiko i muy modesto. Tyene kara de riza. En su passado teniya garaj para adovar otomobiles. Agora es maestro de eskola i ambeza el ofisyo de "Mekanika de Otomobiles" en las klasas de lise. Lavora partialmente i moz puedemoz ver.
    ebreo: ירון הוא מאוד סימפטי וצנוע. יש לו פנים מחייכות. בעברו היה לו מוסך לתיקון רכבים. היום הוא מורה בבית ספר ומלמד את המקצוע של "מכניקה של רכבים" בכיתות של תיכון. עובד במשרה חלקית ואנו יכולים לראות אחד את השני.
  - ladino: A la kaza de tu ermana, una ves en la semana.
    ebreo: לביתה של אחותך, (רק) פעם אחת בשבוע.

