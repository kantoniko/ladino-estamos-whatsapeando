titulo: Akel tyempo - Espiones djudyos 55
pub: 2026.03.17
source: https://ladinokomunita.groups.io/g/main/message/75592

teksto:
  - ladino: Akel tyempo.
    ebreo: בזמנים ההם.
  - ladino: Espiones djudyos 55.
    ebreo: מרגלים יהודים 55.
  - ladino: "En 26 del mayo 2025 Artem i Katya enkargaron los depos fabrikados a los kamyones, los yamaron a los 5 shoferes rusos: Vasily Pytikov, Mikhail Ryumin, Andrey Merkuryev, Alexander Zaitsev i Sergey Kanurin i les dyeron el las manos 5 adresos leshanos, en las rijyones Murmansk, Ivanova, Ryazan, Amur i Irkutsk de la Rusya la grande, ande deven de deskargar los depos."
    ebreo: "ב- 26 למאי 2025 ארטם וקטיה העמיסו את המחסנים הטרומיים למשאיות, קראו ל-5 הנהגים הרוסים: וסילי פיטיקוב, מיכאיל ריומין, אנדריי מרקוריב, אלכסנדר זאיצב וסרגיי קנורין ונתנו בידיהם 5 כתובות רחוקות באיזורים: מורמנסק, איבנובה, ריאזן, אמור ואירקודסק של רוסיה הגדולה, איפה שהם צריכים לפרוק את המחסנים."
  - ladino: Para ayegar a estos adresos aviya menester de viyajar miles de kilometros i dias enteros. Ma los shoferes eran profesyonales.
    ebreo: בכדי להגיע לכתובות האלה היה צריך לנסוע אלפי קילומטרים וימים שלמים. אך הנהגים היו מקצועיים.
  - ladino: El kargo es livyano, en la espalda del vizino.
    ebreo: המטען הוא קל, בגבו של השכן.

