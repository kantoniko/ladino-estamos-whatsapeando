titulo: En este tyempo - Adi 30
pub: 2026.06.18
source: https://ladinokomunita.groups.io/g/main/message/76087

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 30.
    ebreo: עדי 30.
  - ladino: Tehila se esparto, koryo afuera a tomar sus perro "Loka" i se enkasharon Pishin a la kamareta de Abrigo.
    ebreo: תהילה התעוררה, רצה החוצה לקחת את הכלב שלהם "לוקה" (המשוגעת) ונכנסו מיד לממ"ד.
  - ladino: Adi se esparto, korryo afuera, lo ato en el kortijo a sus perro grande tipo "Pastor Alman" yamado "Pit" (ke todos lo yamavan Pita). Tomo a las kriaturas Negev de 3 anyos i mueve mezes i Eshel de 6 mezes, i se enkasharon pishin a la kamareta de Abrigo.
    ebreo: עדי התעוררה, רצה החוצה, קשרה בחצר (שבכניסה) את הכלב שלהם הגדול מסוג "רועה גרמני" הקרוי "פיט" (שכולם קראו לו פיטה). לקחה את הילדים, נגב בן 3 שנים ותשעה חודשים ואשל בן 6 חודשים ונכנסו מיד לממ"ד.
  - ladino: Lo ke teniyan era solo 7 segundos para organizarsen.
    ebreo: היה להם רק 7 שניות להתארגן.
  - ladino: El buen pastor defende su perro de guardia.
    ebreo: רועה טוב מגן על כלב השמירה שלו.


