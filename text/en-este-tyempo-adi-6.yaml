titulo: En este tyempo - Adi 6
pub: 2026.04.23
source: https://ladinokomunita.groups.io/g/main/message/75752

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 6.
    ebreo: עדי 6.
  - ladino: Ayala es la segunda. Es kazada, tyene tres kriaturas. Es maestra de eskola. El primer grado meldo en la universita de Ben Guryon en Beer Sheva i el sigundo grado en la Universita de Hayfa, en Hayfa. Aya se espesyalizo en el kampo de "Terapia en Muvimyento" para sanar ijikos ke sufren de "estres postraumatiko". En djulyo 2023, se kijo aserkar a su ermana Adi i paso a morar en kibuts Kisufim, ke es 4 kilometros de la frontyera de Gazza.
    ebreo: איילה היא השנייה. היא נשואה, יש לה שלושה ילדים. היא מורה בבית ספר. את התואר הראשון היא למדה באוניברסיטת בן גוריון בבאר שבע ואת התואר השני באוניברסיטת חיפה, בחיפה. שם התמחתה בתחום של "טרפיה בתנועה" בכדי לרפא ילדים שסובלים מ"לחץ פוסטראומטי". ביולי 2023, רצתה להתקרב לאחותה עדי ועברה לגור בקיבוץ כיסופים, שהוא 4 ק"מ מגבול עזה.
  - ladino: Si de los ojos no esta serka, del korason se alesha.
    ebreo: אם הוא לא קרוב לעיניים, הוא מתרחק מהלב.

