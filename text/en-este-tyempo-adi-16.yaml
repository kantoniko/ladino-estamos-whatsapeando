titulo: En este tyempo - Adi 16
pub: 2026.05.17
source: https://ladinokomunita.groups.io/g/main/message/75914

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 16.
    ebreo: עדי 16.
  - ladino: Adi i Anani eran personas sosyables. Kada noche de shabat envitavan a los amigos a sus kaza para dizir la beraha i komer endjuntos.
    ebreo: עדי וענני היו אנשים חברותיים. כל ערב שבת היו מזמינים את החברים לביתם בכדי לברך ולאכול ביחד.
  - ladino: Durante el tyempo Anani konvensyo a su ermano, Ahuvya, de vinir i instalarse en el kibuts. Ahuvya vino i se izo el responsable del mantenimyento del kibuts.
    ebreo: במהלך הזמן ענני שכנע את אחיו, אהוביה, לבוא ולהתיישב בקיבוץ. אהוביה הגיע ונהיה אחראי תחזוקה של הקיבוץ.
  - ladino: Ken no tyene ermano no tyene ni pye ni mano.
    ebreo: מי שאין לו אח אין רגל ויד.

