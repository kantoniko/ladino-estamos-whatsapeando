titulo: En este tyempo - Adi 1
pub: 2026.04.12
source: https://ladinokomunita.groups.io/g/main/message/75709

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 1.
    ebreo: עדי 1.
  - ladino: En el 7 de oktobre de 2023, Shabat de Simhat Tora, a las 6:30 de la demanyana, akontesyo un atako de misiles i morteros desde Gaza a Israel. 3000 terroristos penetraron en Israel por aire, por mar i por tyerra, rompiendo el reshado perimetral en 114 puntos a lo largo de la frontyera, aproksimadamente 60 kilometros. Los terroristos entraron kon kamyonetes a las bazas de la armada, okuparon asentamyentos siviles i arivaron a una fiesta de bayle, onde 3000 mansevos estavan baylando i kantando. El atako tuvo luguar un dia dospues del aniversario 50 de la Gerra de Yom Kipur, en la ke Israel fue sorprendido por la parte de Ejipto i Siria.
    ebreo: ב- 7 לאוקטובר 2023, שבת של שמחת תורה, בשעה 6.30 של הבוקר, התרחשה התקפה של טילים ומרגמות מעזה לישראל. 3000 טרוריסטים חדרו לישראל מהאוויר, מהים ומהיבשה תוך כדי פריצה הגדר ההקפי ב- 114 נקודות לאורך הגבול, בערך 60 ק"מ. הטרוריסטים נכנסו עם טנדרים לבסיסי הצבא, כבשו יישובים אזרחיים והגיעו עד למסיבת ריקודים, שבה 3000 צעירים רקדו ושרו. ההתקפה בוצעה יום לאחר 50 שנה ממלחמת יום כיפור, שבה ישראל הופתעה מצד מצריים וסוריה.
  - ladino: Si lo ves demanyana no azes sefte dia entero.
    ebreo: אם תראה אותו בבוקר לא תעשה ספתח כל היום (יום שלם).
