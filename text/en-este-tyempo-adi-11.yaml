titulo: En este tyempo - Adi 11
pub: 2026.05.05
source: https://ladinokomunita.groups.io/g/main/message/75818

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 11.
    ebreo: עדי 11.
  - ladino: Adi i Anani se izyeron amigos. Tambyen kedaron amigos en el servisyo militaryo. Adi sirvyo en el departamento de intelijensya i se espesyalizo en siberespasyo. Anani i Adi syempre avlaron por "Kulturar la tyerra" i mantenersen de agrikultura. Asta ke toparon amigos, "Tsionistos lokos" komo eyos, ke desidaron a kriyar un grupo yamado "Grano de Kooperadores". Grupo, de kaji 10 mansevos, ke kere fraguar un asentamyento de agrikultura. Djuntos redaktaron el "Dokumento de Vizyon" ke los akompanyara en el futuro.
    ebreo: עדי וענני נהיו חברים. נשארו חברים גם בשירות הצבאי. עדי שירתה באגף המודיעין והתמחתה במרחב הסייבר. עדי וענני תמיד דיברו על "לעבוד את האדמה" ולהתפרנס מחקלאות. עד שמצאו חברים, "ציונים משוגעים" כמוהם, שהחליטו להקים קבוצה הקרויה "גרעין השותפות". קבוצה, של כ- 10 צעירים, שרוצה לבנות יישוב חקלאי. יחד הם ערכו את "מסמך החזון" שילווה אותם בעתיד.
  - ladino: Los pasajes de la manseves, los rekordos de la vyejez.
    ebreo: החוויות של הצעירות, הזיכרונות של זקנה.

