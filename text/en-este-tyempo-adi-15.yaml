titulo: En este tyempo - Adi 15
pub: 2026.05.14
source: https://ladinokomunita.groups.io/g/main/message/75899

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 15.
    ebreo: עדי 15.
  - ladino: En parallel, Adi empeso a estudyar en la universita. Termino sus estudyos kon reushita grande. Estudyo el primer grado sovre injineria de kimika en la universidad de Ben Guryon (Beer Sheva) i lo termino kon "ekselensya". El sigundo grado (masteriya) sovre la investigasyon del desierto i la produksyon de enerjiya solara, lo termino kon "ekselensya sovresalyente" en Midreshet Sade Boker (ke es una parte de la mizma universita). Todo esto, kon las notas las mas altas de la klasa, desde 25 anyos. Asigun los profesores de la universita, el lavoro suyo sovre la produksyon de enerjiya solara tyene posibilitad alta de ganar el premyo de nobel en la rama de kimika.
    ebreo: במקביל עדי התחילה ללמוד באוניברסיטה. סיימה את לימודיה בהצלחה גדולה. למדה תואר ראשון בהנדסה כימית באוניברסיטת בן גוריון (באר שבע) וסיימה "בהצטיינות". את התואר השני (מסטר) על חקירת המדבר וייצור אנרגיה סולרית סיימה "בהצטיינות יתרה" במדרשת שדה בוקר (שזה חלק מאותה מהאוניברסיטה). הכל, עם הציונים הכי גבוהים בכיתה מזה 25 שנה. על פי הפרופסורים של האוניברסיטה, העבודה שלה על ייצור אנרגיה סולרית היא בעלת סיכויים גבוהים לזכות בפרס נובל בענף הכימיה.
  - ladino: El mijor premyo es mereserlo.
    ebreo: הפרס הטוב ביותר הוא להיות ראוי לו.

