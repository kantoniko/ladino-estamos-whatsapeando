titulo: En este tyempo - Adi 33
pub: 2026.06.25
source: https://ladinokomunita.groups.io/g/main/message/76133

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 33.
    ebreo: עדי 33.
  - ladino: Pasaron kaji 40 minutos. Los misiles ke estan vinyendo de Gazza i los sonos de "bum" no se keren terminar. Yaron salyo de la Kamareta de Abrigo para mirar de la ventana i ver kualo esta afitando. Lo ke vido era muy temerozo. Dyezes de teroristos vinidos de Gazza, armados de punta de pye asta la kavesa, kon tiros, bombas de mano, roketas RPG, eksplosivos i mas... suvidos enriva de motosikletas, estan desbrochando el bariero del kibuts i entrando aryentro.
    ebreo: עברו כ-40 דקות. הטילים המגיעים מעזה וקולות ה"בום" לא רוצים להסתיים. ירון יצא מהממ"ד בכדי להסתכל מהחלון ולראות מה קןרה. מה שראה היה מחריד מאוד. עשרות טרוריסטים שהגיעו מעזה, חמושים מקצה הרגל ועד הראש, עם רובים, רימונים, רקטות RPG, חומרי נפץ ועוד... רכובים על אופנועים, פורצים את הגדר של הקיבוץ ונכנסים פנימה.
  - ladino: "En akeyos momentos Yaron i todos los Israelyanos empesaron a entender los tres faktos terivles de akel dia: 1. No se trata solo de misiles tirados por 10-15 puntos. 2. Se trata de Gerra kontra teroristos de Gazza ke entraron a Israel. 3. La armada israelyana no esta por enmedyo."
    ebreo: באותם רגעים ירון וכל הישראלים התחילו להבין את 3 העובדות הנוראיות של אותו יום. 1. לא מדובר רק בטילים המשוגרים ל- 10-15 דקות. 2. מדובר במלחמה נגד טרוריסטים מעזה שנכנסו לישראל. 3. הצבא הישראלי איננו בנמצא.
  - ladino: Ken tiene ventanas de vidro, ke no eche piedras al vizino.
    ebreo: מי שיש לו חלונות זכוכית, שלא יזרוק אבנים על שכנו.


