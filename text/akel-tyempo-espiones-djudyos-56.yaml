titulo: Akel tyempo - Espiones djudyos 56
pub: 2026.03.19
source: https://ladinokomunita.groups.io/g/main/message/75600

teksto:
  - ladino: Akel tyempo.
    ebreo: בזמנים ההם.
  - ladino: Espiones djudyos 56.
    ebreo: מרגלים יהודים 56.
  - ladino: En mizmo tyempo Artem i Katya entraron a un karavan, disheron a sus vizinos ke estan salyendo a un paseo a deskansarsen, i salyeron al kamino.
    ebreo: באותו זמן ארטם וקטיה נכנסו לקרוון, אמרו לשכנים שהם יוצאים לטייל בכדי לנוח ויצאו לדרך.
  - ladino: Los sinko shoferes salyeron al viyaje. Vasily Pytikov era bivdo. Su mujer aviya murido en la pandemiya de korona. Iva tener aniversaryo en el 31 de mayo, djusto kuando iva arivar a su destino en la rijyon Amur. No se save kualo afito i el kamyon de Vasily se eksplozo en el kamino.
    ebreo: חמשת הנהגים יצאו למסע. וסילי פיטיקוב היה אלמן. אישתו מתה במגפת קורונה. היה צריך להיות לו יום הולדת ב- 31 במאי, בדיוק כשהיה צריך להגיע ליעדו באזור אמור. לא ידוע מה קרה והמשאית של וסילי התפוצצה בדרך.
  - ladino: El desmazalado de Vasily muryo en su luguar.
    ebreo: וסילי המסכן מת בו במקום.
  - ladino: Se enkanto Hanino en medio del kamino.
    ebreo: התפלא חנינו באמצע הדרך.

