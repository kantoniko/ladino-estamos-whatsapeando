titulo: Akel tyempo - Espiones djudyos 47
pub: 2026.02.26
source: https://ladinokomunita.groups.io/g/main/message/75482

teksto:
  - ladino: Akel tyempo.
    ebreo: בזמנים ההם.
  - ladino: Espiones djudyos 47.
    ebreo: מרגלים יהודים 47.
  - ladino: En 2004, Catherine enkontro un estudyante nasido de Yemen, Fares shakdam. Se akodro ke su nona le diziya "Ijika sefaradia buena no sale kon ijiko, se kaza kon el". Se kazaron i aresivyo la alkunya Shakdam. Les nasyeron ijo i ija. El marido no teniya lavoro. La konvensyo de vinir kon el a Yemen. En 2010 arivaron a Yemen. En Yemen, Fares se troko enteramente. Se averguenso ke su mujer i sus kriaturas son djudyos. La forso a Catherine a konverser al islamizmo. No kijo a sus kriaturas en su vida. Troko su komporto i los empeso a aharvar. Fin a oy Catherine tyene sikatrizes.
    ebreo: ב- 2004 קטרין פגשה סטודנט יליד תימן, פהרז שקדם. נזכרה בסבתא שלה שהייתה אומרת "ילדה ספרדייה טובה לא יוצאת עם בחור, מתחתנת איתו". התחתנו וקיבלה את שם המשפחה שקדם. נולדו להם בן ובת. לבעלה לא הייתה עבודה. שכנע אותה לבוא איתו לתימן. ב- 2010 הגיעו לתימן. בתימן פהרז השתנה לחלוטין. התבייש שאשתו וילדיו יהודים. הכריח את קטרין להחליף את דתה לאיסלם. לא רצה את ילדיו בחייו. שינה את התנהגותו והתחיל להכות אותם. עד היום לקטרין יש צלקות.
  - ladino: En 2014 Catherine reusho de kitarse de el i tornar a Ingletyerra kon sus kriaturas.
    ebreo: ב- 2014 קטרין הצליחה להתגרש ממנו ולחזור לאנגליה עם ילדיה.
  - ladino: Ser prove no es veguensa.
    ebreo: להיות עני זה לא בושה.
