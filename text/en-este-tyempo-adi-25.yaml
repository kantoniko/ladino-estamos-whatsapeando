titulo: En este tyempo - Adi 25
pub: 2026.06.07
source: https://ladinokomunita.groups.io/g/main/message/76015

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 25.
    ebreo: עדי 25.
  - ladino: Yaron vino al Kibuts Holit, de Yerushalayim. Ayala i su famiya vinyeron de Kibuts Kisufim (ke es 20 puntos de kamino). Todos endjuntos se asentaron al pranso de Shabat. Se disheron las brehas (orasyones) se komyo, se bevyo, djugaron kon los inyetos i kantaron kantikas. Anani le demando a yaron si demanyana deprano kere vinir kon el al festival de Psyduck. Yaron le disho ke prefera a deskansarse.
    ebreo: ירון הגיע לקיבוץ חולית, מירושלים. איילה ומשפחתה הגיעו מקיבוץ כיסופים (שזה דרך של 20 דקות). כולם ביחד ישבו בשולחן של שבת. נאמרו הברכות, אכלו, שתו, שחקו עם הנכדים ושרו שירים. ענני שאל את ירון אם בבוקר מוקדם הוא רוצה לבוא איתו לפסטיבל הפסיידק. ירון אמר לו שהוא מעדיף לנוח.
  - ladino: La vizina de Adi, Avital Aladjem, estava akeya tadre en Yerushalayim kon sus paryentes. Dospues de komer desido a tornar al kibuts i no kedarse en Yerushalayim. Arivo a su kaza bastante tadre.
    ebreo: השכנה של עדי, אביטל אלדג'ם, הייתה באותו ערב בירושלים עם משפחתה. אחרי האוכל החליטה לחזור לקיבוץ ולא להישאר בירושלים. הגיעה לביתה די מאוחר.
  - ladino: Otro gayo mos kantava.
    ebreo: (אם זה היה המצב) תרנגול אחר היה שר לנו.

