titulo: Akel tyempo - Espiones djudyos 52
pub: 2026.03.10
source: https://ladinokomunita.groups.io/g/main/message/75546

teksto:
  - ladino: Akel tyempo.
    ebreo: בזמנים ההם.
  - ladino: Espiones djudyos 52.
    ebreo: מרגלים יהודים 52.
  - ladino: En el empesijo de 2024, ofisyales ukrainos de grado alto se enkontraron kon ofisyales israelyanos de grado alto. Los ukrainos se kesharon ke aviyones rusos estan dekolando desde bazas muy leshanas, estan tirando a Ukraina misiles aire-tierra de distansyas muy largas i ke esto les esta kostando danyo grande. Rogaron de Israel antimisiles kontra los misiles rusos. Los israelyanos les disheron ke no les pueden abasteser antimisiles porke van a topar la bela kon los rusos i empesaron a avlar de la literature grega Antigua. Homero, Odisea, la gerra de Troya, el kavayo de Troya.
    ebreo: בתחילת 2024, קצינים אוקראינים בדרגות גבוהות נפגשו עם קצינים ישראלים בדרגות גבוהות. האוקראינים התלוננו שמטוסים רוסיים ממריאים מבסיסים רחוקים מאוד, יורים על אוקראינה טילי אוויר-קרקע ממרחקים מאוד ארוכים ושזה גורם להם נזק גדול. ביקשו מישראל טילי הגנה נגד הטילים הרוסים. הישראלים אמרו שהם לא יכולים לספק טילי הגנה כי הם יסתבכו בצרות מול הרוסים והתחילו לדבר על ספרות של יוון העתיקה. הומרוס, אודיסאה, מלחמת טרויה, הסוס הטרויאני.
  - ladino: Si keres ser amado, ama de buen grado.
    ebreo: אם אתה רוצה להיות אהוב, אהוב בדרגה טובה (הרבה).
