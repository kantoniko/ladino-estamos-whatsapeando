titulo: En este tyempo - Adi 18
pub: 2026.05.21
source: https://ladinokomunita.groups.io/g/main/message/75933

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 18.
    ebreo: עדי 18.
  - ladino: Tehila nasyo en 1991 en la sivdad Gedera. Eran 5 ermanas. El servisyo militar lo kompleto en la Divizyon de Parashutistos dublando los parachutes de los parashutistos. Dospues del sevisyo estudyo Edukasyon en el kolej de Tel Hay. Teniya karika de riza. Era entelijente, yena de luz i kalor. A las amigas les diziya "Kada dia voz va a abrasar asta ke vos vash a ambezar a abrasar".
    ebreo: תהילה נולדה ב- 1991 בעיר גדרה. הן היו 5 אחיות. את שירותה הצבאי השלימה בחטיבת הצנחנים בקיפול המצנחים של הצנחנים. לאחר השירות למדה חינוך במכללת תל-חי. היו לה פנים צוחקות. הייתה אינטליגנטית, מלאה באור וחום. לחברותיה הייתה אומרת "אחבק אתכן כל יום עד שתלמדו לחבק".
  - ladino: En el enverano de 2023 desido Tehila de vinir al kibuts Holit i bivir kon su amigo amado, Ahuvya.
    ebreo: בקיץ 2023 החליטה תהילה לבוא לקיבוץ חולית ולחיות עם חברה אהובה, אהוביה.
  - ladino: Ken muncho abrasa poko apreta.
    ebreo: מי שמחבק הרבה לוחץ מעט.

