titulo: En este tyempo - Adi 10
pub: 2026.05.03
source: https://ladinokomunita.groups.io/g/main/message/75806

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 10.
    ebreo: עדי 10.
  - ladino: Yonadav Kaplun es uno de los poetas famozos en Israel. Nasyo en 1963 en Melbourne Australia. En 1970 izo Aliya a Israel. Mora en yerushalayim. Eskrivyo mas de 15 livros. Gano munchos premyos. Tyene 4 ijikos i ijikas. Dos de eyos son el ijo Anani (respondeme) i el ijo Ahuvya (amado del Dyo). Anani tambien era volontaryo en Azilos de Vyejos. Aya se rankontro kon Adi.
    ebreo: יונדב קפלון הוא אחד המשוררים המפורסמים בישראל. נולד ב- 1963 במלבורן אוסטרליה. ב- 1970 עשה עליה לישראל. גר בירושלים. כתב יותר מ- 15 ספרים. זכה בפרסים רבים. יש לו 4 בנים ובנות. שניים מהם הם הבן ענני (תענה לי) והבן אהוביה (אהוב על אלוהים). גם ענני היה מתנדב בבתי אבות. שם נפגש עם עדי.
  - ladino: Pedrer por konoser no es pedrer, es ganar.
    ebreo: להפסיד בשביל להכיר זה לא להפסיד, זה להרוויח.
