titulo: En este tyempo - Adi 17
pub: 2026.05.19
source: https://ladinokomunita.groups.io/g/main/message/75926

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 17.
    ebreo: עדי 17.
  - ladino: Ahuvya teniya kaveyos kon buklas. Un dia desido de arapar la kavesa entera i espartir de las buklas. Dospues ke se arapo le tuyo el korason. Les disho a sus amigos ke va bushkar amiga kon buklas. Publiko en la linea ke esta bushkando amiga kon buklas. Vinyeron 5 repuestas. Los amigos en el kibuts eskojyeron a Tehila Kaatabi.
    ebreo: לאהוביה היו שערות עם תלתלים. יום אחד החליט לספר את כל הראש ולהיפרד מהתלתלים. לאחר שהסתפר כאב לו הלב. לחברים אמר שיחפש חברה עם תלתלים. פרסם ברשת שהוא מחפש חברה עם תלתלים. הגיעו 5 תשובות. החברים בקיבוץ בחרו בתהילה קעטבי.
  - ladino: Ahuvya i Tehila Empesaron a komunikarsen. En poko tyempo se izyeron amigos.
    ebreo: אהוביה ותהילה התחילו להיות בקשר. תוך זמן קצר נהיו חברים.
  - ladino: La karne, de la unya no se esparte.
    ebreo: הבשר מהציפורן לא נפרד.

