titulo: En este tyempo - Adi 19
pub: 2026.05.24
source: https://ladinokomunita.groups.io/g/main/message/75964

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 19.
    ebreo: עדי 19.
  - ladino: Adi i Anani trusheron 2 ijikos al mundo. Negev nasyo en enero de 2020. Eshel nasyo en April de 2023.
    ebreo: עדי וענני הביאו 2 ילדים לעולם. נגב נולד בינואר של 2020. אשל נולד באפריל 2023.
  - ladino: Teniyan una vizina ka morava al lado de eyos. Avital Aladjem. Mansevika, selibatera. Muy sempatika. Maestra, espesyalizade en el kampo de "Terapia de kriyaturas en Muvimyento". Tambien maestra de pilates. Los keriya bien a Negev i Eshel. De vez en kuando le ayudava a Adi kon las kriyaturas. Las noches de shabat komiyan endjuntos en la kaza de Adi.
    ebreo: הייתה להם שכנה שגרה לידם. אביטל אלדג'ם. צעירה, רווקה. מאוד סימפטית. מורה, מתמחה בתחום של "טיפול בילדים בתנועה". גם מורה לפילטיס. אהבה את נגב ואשל. מדי פעם הייתה עוזרת לעדי עם הילדים. ערבי שבת אכלו יחד בביתה של עדי.
  - ladino: El pan de la vizina es por melezina.
    ebreo: הלחם של השכנה הוא לרפואה.




