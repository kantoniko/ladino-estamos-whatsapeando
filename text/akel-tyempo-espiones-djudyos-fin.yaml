titulo: Akel tyempo - Espiones djudyos fin
pub: 2026.03.29
source: https://ladinokomunita.groups.io/g/main/message/75663

teksto:
  - ladino: Akel tyempo.
    ebreo: בזמנים ההם.
  - ladino: Espiones djudyos fin.
    ebreo: מרגלים יהודים סוף.
  - ladino: Syenes de trones empesaron a alsarsen en estas 7 sivdades de Iran i destruyir objektivos militaryos. Ademas, supyeron a entrar egzaktamente a las kamaretas de echar de munchos funksyonaryos importantes i matarlos en durmyendo (Komo supyeron ande estan las kamaretas de echar??).
    ebreo: מאות כתב"מים התחילו להתרומם בשבע הערים של אירן ולהרוס מטרות צבאיות. יתר על כן, ידעו להיכנס במדוייק לחדרי השינה של בעלי תפקידים חשובים רבים ולהרוג אותם בשינתם (איך ידעו איפה נמצאים חדרי השינה??).
  - ladino: Catherine Perez Shakdam se desparesyo en la frontyera de norte.
    ebreo: קטרין פרז שקדאם נאלמה בגבול הצפוני.
  - ladino: Los mizmos trones estan destruyendo oy en dia las bazas i barieras de la Guardia Basij, embiadores de misiles i mas.
    ebreo: אותם הכתב"מים הורסים בימים אלה את הבסיסים והמחסומים של משמרות הבסיג', משגרי טילים ועוד, באירן.
  - ladino: Este modo se esta kompletando la operasyon moderna "El Kavayo de Troya". Si antes 2800 anyos Homero saviya ke ivan aver trones i kamyones, puede ser ke eskriviya otro modo la ovra literarya de Odisea.
    ebreo: כך מושלם מבצע "הסוס הטוריאני" המודרני. אם לפני 2800 שנה הומרוס היה יודע שיהיו כתב"מים ומשאיות, יכול להיות שהיה כותב באופן שונה את היצירה הספרותית אודיסאה.
  - ladino: La pas fragua nidos, la gerra los destruye.
    ebreo: השלום בונה קנים, המלחמה הורסת אותם.

