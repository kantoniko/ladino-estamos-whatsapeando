titulo: Akel tyempo - Espiones djudyos 45
pub: 2026.02.22
source: https://ladinokomunita.groups.io/g/main/message/75456

teksto:
  - ladino: Akel tyempo.
    ebreo: בזמנים ההם.
  - ladino: Espiones djudyos 45.
    ebreo: מרגלים יהודים 45.
  - ladino: Markus ensistyo ke no aktuo kontra Israel.
    ebreo: מרכוס עמד על כך שלא פעל נגד ישראל.
  - ladino: "Abashando del Monte de los Olivos en Yerushalayim, se detuvo, tomo algunos pedasikos de la Tierra de Israel i disho: \"Kero meterlos en la tomba de mi ermano Konrad\"."
    ebreo: "ביורדו מהר הזיתים שבירושלים, נעצר, לקח כמה רגבי אדמה ישראלית ואמר: \"אני רוצה לשים במצבה של אחי קונרד\"."
  - ladino: "Markus eskrivyo otro livro titulado \"Sekretos de la kozina rusa\", envio una kopya a Gad Shimron, ke es jurnalisto israelyano i teniya sirvido en el Mosad, kon la fraza eskrita: \"Estos son todos los sekretos ke esto pronto a revelar\"."
    ebreo: "מרכוס כתב ספר אחר שכותרתו (שמו) \"סודות מהמטבח הרוסי\", שלח עותק לגד שימרון, שהוא עיתונאי ישראלי ושירת במוסד, עם המשפט הרשום: \"אלה הם כל הסודות שאני מוכן לגלות\"."
  - ladino: Markus Wolf muryo a los 83 anyos, en Berlin, en el 9 de novembre 2006.
    ebreo: מרכוס וולף נפטר בגיל 83, בברלין, ב- 9 לנובמבר 2006.
  - ladino: En kada tyerra su uzo, en kada kaza su kostumbre.
    ebreo: בכל אדמה (ארץ) ההרגלים שלה, בכל בית המנהגים שלו.
