titulo: Akel tyempo - Espiones djudyos 48
pub: 2026.03.01
source: https://ladinokomunita.groups.io/g/main/message/75500

teksto:
  - ladino: Akel tyempo.
    ebreo: בזמנים ההם.
  - ladino: Espiones djudyos 48.
    ebreo: מרגלים יהודים 48.
  - ladino: Catherine Lavoro todos los anyos komo jurnalista en medios komo Press TV, Herald Tribune, Russia Today, Oslo Times i mas... Su mesaj jeneral era kontra Israel i kontra el tsionizmo. Eskrivyo i avlo kon muncha dureza kontra Israel. Kritiko la politika eksteriora de Britanya i de los Estados Unidos eskrivyendo ke estan kavzando desgrasya en el Oriente Medio, sirvyendo los intereses de Israel. La entrevistaron en kanales arabos de Siriya, Liban i mas.
    ebreo: קטרין עבדה כל השנים כעיתונאית באמצעי תקשורת כגון Press TV, Herald Tribune, Russia Today, Oslo Times  ועוד... המסר העיקרי שלה היה נגד ישראל ונגד הציונות. כתבה ודיברה נגד ישראל בצורה קשה. ביקרה את פוליטיקת החוץ של בריטניה וארה"ב בכותבה שהן גורמות לאסון במזרח התיכון, בשירותם את האינטרסים של ישראל. ראיינו אותה בערוצים ערבים בסוריה, לבנון ועוד.
  - ladino: Asta ke atiro la atansyon de Nader Talebzadeh, jurnalisto i propagandador grande del rejim de Iran.
    ebreo: עד שמשכה את תשומת ליבו של נאדר טליבזדה, עיתונאי ותעמולן גדול של המשטר האירני.
  - ladino: Una ves es grasya, dos enfasya tres es desgrasya.
    ebreo: פעם אחת היא חביבות, שניים נמאס, שלוש אסון.
