titulo: Akel tyempo - Espiones djudyos 54
pub: 2026.03.15
source: https://ladinokomunita.groups.io/g/main/message/75583

teksto:
  - ladino: Akel tyempo.
    ebreo: בזמנים ההם.
  - ladino: Espiones djudyos 54.
    ebreo: מרגלים יהודים 54.
  - ladino: El hangar estava aktivo asta las oras altas de la madrugada. Entravan merkansias, saliyan merkansias, entravan kashas, saliyan kashas... Los povres de Artem i Katya lavoravan muy duro. La luz del hangar estava ensedida 24 oras en la diada.
    ebreo: ההנגר היה פעיל עד לשעות הגבוהות (הקטנות) של השחר. נכנסו סחורות, יצאו סחורות, נכנסו ארגזים, יצאו ארגזים... ארטם וקטיה המסכנים עבדו מאוד קשה. האור של ההאנגר היה דלוק 24 שעות ביממה.
  - ladino: En supito les vino dezeo (?) de fraguar depos fabrikados.
    ebreo: פתאום בא להם חשק (?) לבנות מחסנים טרומיים...
  - ladino: Empesaron a fraguarlos estrechos i largos para ke puedan entrar a los kamyones.
    ebreo: התחילו לבנות אותם צרים וארוכים בכדי שיכלו להיכנס למשאיות.
  - ladino: Es ke estavan konsiderando de avrir negosyo muevo de produksyon de depos? No se save.
    ebreo: האם הם שקלו לפתוח עסק חדש של ייצור מחסנים? לא ידוע.
  - ladino: Oras buenas i klaras.
    ebreo: שעות טובות ובהירות.

