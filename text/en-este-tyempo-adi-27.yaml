titulo: En este tyempo - Adi 27
pub: 2026.06.11
source: https://ladinokomunita.groups.io/g/main/message/76046

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 27.
    ebreo: עדי 27.
  - ladino: 7 de oktobre 2023, 4.30 de la madrugada. Anani i Ahuvya se alevantaron en kayades, para no espertar a las mujeres i a los chikos. Se vistyeron. Anani tomo su revolver de la kasha. Salyeron de kaza, arekojyeron a sus grupo de 30 mansevos, tomaron kon eyos dezayuno i salyeron al kamino indosen al festival mensyonado en la natura, Psyduck, para oyir muzika, azer piknik i ver el amaneser.
    ebreo: 7 לאוקטובר 2023 4.30 עם שחר. ענני ואהוביה קמו בשקט, בכדי לא להאיר את הנשים והילדים. התלבשו. ענני לקח את האקדח שלו מהכספת. יצאו מהבית, אספו את קבוצה של 30 הצעירים, לקחו איתם ארוחת בוקר ויצאו לדרך בהולכם לפסטיבל הנזכר בטבע, פסיידק, בכדי לשמוע מוזיקה, לעשות פקניק ולראות את הזריחה.
  - ladino: El buen dia si ve de la madrugada.
    ebreo: יום טוב רואים מהשחר.

