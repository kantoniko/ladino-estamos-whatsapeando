titulo: En este tyempo - Adi 9
pub: 2026.04.30
source: https://ladinokomunita.groups.io/g/main/message/75787

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 9.
    ebreo: עדי 9.
  - ladino: Adi era atleta, djugava basketbol i era miembra de un grupo de bayladores. Durante 8 anyos tanyo el saksafon. Tanyava i armonika. Kuando teniya 16 anyos se iva kada dia a restorantes i salas de fiestas, arekojiya las komidas sovradas, las traiya a la eskola. En la eskola, djuntos kon los amigos, aparejavan porsyones de komidas i las yevavan a las kazas de los menesterozos, de vyejos, de invalides i mas. I mas de esto, les ayudava a alimpyar i enderechar las kazas. En paralel era volontarya en Azilos de Vyejos, ayudandoles todo lo ke es menester. Todo esto volontaryamente i sin alavarse. Era muy modesta.
    ebreo: עדי הייתה אתלטית, שיחקה כדורסל והייתה חברה בקבוצת רקדנים. במשך 8 שנים נגנה בסקספון. ניגנה גם במפוחית. כשהייתה בת 16 הייתה הולכת מדי יום למסעדות ולאולמי אירועים, אוספת את האוכל שנשאר, מביאה לבית הספר. בבית הספר, יחד עם החברים, היו מכינים מנות אוכל ולוקחים אותן לבתים של נצרכים, זקנים, נכים וכול... יתר על כן הייתה עוזרת להם לנקות ולסדר את הבתים. במקביל הייתה מתנדבת בבתי אבות, עוזרת להם בכל מה שצריך. כל זאת בהתנדבות ובלי להתפאר. הייתה מאוד צנועה.
  - ladino: Si no sovra, no abasta.
    ebreo: אם לא נשאר, לא מספיק.
