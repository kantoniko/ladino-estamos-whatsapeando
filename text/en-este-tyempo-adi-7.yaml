titulo: En este tyempo - Adi 7
pub: 2026.04.26
source: https://ladinokomunita.groups.io/g/main/message/75759

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 7.
    ebreo: עדי 7.
  - ladino: Asaf es el mas chiko i es muy talentozo. Kijo meldar medisina en la Universite de Ben Guryon. No lo tomaron. Meldo biolojia i tomo el primer grado. Dospues demando yene a meldar medisina, todas las univesitas lo kijyeron tomar.
    ebreo: אסף הוא הקטן ביותר ומאד כשרוני. רצה ללמוד רפואה באוניברסיטת בן גוריון. לא קיבלו אותו. למד ביולוגיה וסיים תואר ראשון. לאחר מיכן ביקש שוב ללמוד רפואה, כל האוניברסיטאות רצו לקבל אותו.
  - ladino: Antes unos kuantos mezes eskapo sus estudyos de medisina i Agora se esta espesyalizando en kampo de "Psikiatriya de Kriyaturas". Es selibater i mora en la sivdad Ramat Gan.
    ebreo: לפני כמה חודשים סיים את לימודי הרפואה ועכשיו הוא מתמחה בתחום "פסיכיאטריה של ילדים". הוא רווק וגר בעיר רמת גן.
  - ladino: Dar es honor, demandar es dolor.
    ebreo: לתת זה כבוד, לבקש זה כאב.

