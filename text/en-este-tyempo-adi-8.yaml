titulo: En este tyempo - Adi 8
pub: 2026.04.28
source: https://ladinokomunita.groups.io/g/main/message/75775

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 8.
    ebreo: עדי 8.
  - ladino: Adi (djoya) se engrandesyo en el kartye Gilo de Yerushalayim ke es serka de los kazales arabos. Su madre avlava en inglez i Adi se ambezo muy presto avlar inglez perfekto. Desde la eskola primarya ya era la portaboz de la eskola para los menesteres de relasyones publikas.
    ebreo: עדי (תכשיט) גדלה בשכונת גילה בירושלים שזה קרוב לכפרים ערביים. אמא שלה דיברה באנגלית, גם עדי למדה מהר מאד לדבר אנגלית מושלמת. מאז בית הספר העממי כבר הייתה הדוברת של בית הספר לצורכי יחסי ציבור.
  - ladino: En la epoka de la "intifada segunda" (atakos de los arabos) i el tiramyento de la sivdad araba Beit Lehem al kartye Gilo, la Ajensiya Djudia uzava a trayer grupos de turistos djudyos, kon otobuses, a la kaza de Yaron i Jackie. I Adi, de 9 anyos, les dava a entender a los turistos, en inglez fluente, komo se bive debasho de estos tiros.
    ebreo: בתקופת ה"אינטיפדה השנייה" (התקפות של הערבים) והיריות מהעיר הערבית בית לחם לשכונת גילה, הסוכנות היהודית נהגה להביא קבוצות תיירים יהודים, באוטובוסים, לביתם של ירון וג'אקי. ועדי, בת ה-9, הייתה מסבירה לתיירים, באנגלית שוטפת, איך חיים תחת יריות אלה.
  - ladino: Bivas Kreskas i engrandeskas komo el pishkadiko en aguas freskas, amen!
    ebreo: חיה צמח וגדל כמו דג קטן במיים צוננים, אמן!

