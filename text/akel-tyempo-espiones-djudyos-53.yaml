titulo: Akel tyempo - Espiones djudyos 53
pub: 2026.03.12
source: https://ladinokomunita.groups.io/g/main/message/75558

teksto:
  - ladino: Akel tyempo.
    ebreo: בזמנים ההם.
  - ladino: Espiones djudyos 53.
    ebreo: מרגלים יהודים 53.
  - ladino: En oktobre 2024 los Timofeev'es desidaron de trokar ofisyo. Fundaron una kompaniya de transportasyon. Merkaron 5 kamyones grandes, semi trailer, alkilaron un hangar grande, empyegaron shoferes rusos i empesaron a lavorar. Los echos estavan muy buenos. Indimas ke Rusya esta debasho del boykot amerikano i uza la frontyera Rusia-Kazahistan para evitar el embargo i trayer merkansiyas fuyidas "Kachak". En esta frontyera los funksyanaryos no meten muncho kudyo a lo ke pasa.
    ebreo: באוקטובר 2024 הטימופאבים החליטו לשנות מקצוע. ייסדו חברת הובלות. קנו 5 משאיות גדולות, סמי טריילר, שכרו הנגר גדול, שכרו נהגים רוסים והתחילו לעבוד. העסקים היו טובים מאוד. במיוחד שרוסיה נמצאת תחת חרם אמריקאי ומשתמשת בגבול רוסיה-קזחסטאן בכדי להתחמק מהאמברגו ולהביא סחורות מוברחות "מוברח בטורקית". בגבול זה האחראיים לא מקפידים הקפדה יתרה על מה שעובר.
  - ladino: Sin lavorar por tu provenir no topas tu avenir.
    ebreo: אם לא תעבוד למען עתידך לא תמצא את עתידך.
