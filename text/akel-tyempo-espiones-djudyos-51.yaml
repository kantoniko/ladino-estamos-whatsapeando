titulo: Akel tyempo - Espiones djudyos 51
pub: 2026.03.08
source: https://ladinokomunita.groups.io/g/main/message/75541

teksto:
  - ladino: Akel tyempo.
    ebreo: בזמנים ההם.
  - ladino: Espiones djudyos 51.
    ebreo: מרגלים יהודים 51.
  - ladino: Artem Timofeev (38) i Ekaterina "Katya" Timofeeva (35) son un par de mansevos kazados. El era DJ en los klubes de Kiev, el kapital de Ukraina i eya se ganava la vida eskriviendo novelas erotikas i azyendo tatuajes. El padre de Artem biviya en rusya i teniya una fabrika de produksyon agroindustrial, yamada Opkor. Lo yamo a su ijo ke venga a bivir en Rusya i lavorar kon el.
    ebreo: ארטם טימופאב (38) ואקטרינה "קטיה" טימופאבה (35) הם זוג צעירים נשואים. הוא היה DJ במועדונים של קייב, בירת אוקריינה והיא התפרנסה מכתיבת נובלות ארוטיות וביצוע קעקועים. אביו של ארטם חי ברוסיה והיה לו בית חרושת לייצור חקלאות תעשייתית, הקרוי אופקור. הוא קרא לבן שלו לבוא לחיות ברוסיה ולעבוד איתו.
  - ladino: En 2018, Artem i Katya pasaron a bivir en rusya en la sivdad de Miass, en la rejion de Cheliabinsk, ke es solo 135 kilometros de la frontyera Rusia-Kazahistan. Artem empeso a lavorar kon su padre i Katya kontinuo su ofisyo de tatuar i eskrivir novelas. El par bivyeron sus vidas kon normalidad total.
    ebreo: ב- 2018, ארטם וקטיה עברו לגור ברוסיה בעיר מיאס, באיזור צ'ליאבינסק, שזה רק 135 קילומטר מגבול רוסיה-קזחיסטאן. ארטם התחיל לעבוד עם אביו וקטיה המשיכה במקצוע שלה של קעקועים ולכתוב נובלות. הזוג חיו חיים נורמטיביים מלאים.
  - ladino: Guadrate de una ora mala, biviras mil anyos.
    ebreo: שמור על עצמך משעה רעה (מצרות), תחייה אלף שנים.
