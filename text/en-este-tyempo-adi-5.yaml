titulo: En este tyempo - Adi 5
pub: 2026.04.21
source: https://ladinokomunita.groups.io/g/main/message/75742

teksto:
  - ladino: En este tyempo.
    ebreo: בזמן הזה.
  - ladino: Adi 5.
    ebreo: עדי 5.
  - ladino: Dospues, las difikultades se enderecharon i el par trusheron al mundo otras tres kriyaturas. Dos ijikas, Ayala i Adi i un ijiko Asaf. La famiya moraron en Yerushalayim.
    ebreo: לאחר מכן הקשיים הסתדרו והזוג הביאו לעולם עוד שלושה ילדים. ושתי בנות, איילה ועדי ובן אסף. המשפחה גרה בירושלים.
  - ladino: Los ijikos fueron edukados en la eskola TALI (eskola refuersada en estudyos djudios) ke es un sentro de "Edukasyon Djudio Israelyano Prularisto".
    ebreo: הילדים למדו בבית ספר תל"י (בית ספר עם תגבור לימודי יהדות) שהוא מרכז ל"חינוך יהודי ישראלי פרולריסטי".
  - ladino: La verdad demanda de la kriyatura.
    ebreo: את האמת תשאל מהילד.

