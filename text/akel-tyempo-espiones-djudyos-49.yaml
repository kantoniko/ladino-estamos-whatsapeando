titulo: Akel tyempo - Espiones djudyos 49
pub: 2026.03.03
source: https://ladinokomunita.groups.io/g/main/message/75512

teksto:
  - ladino: Akel tyempo.
    ebreo: בזמנים ההם.
  - ladino: Espiones djudyos 49.
    ebreo: מרגלים יהודים 49.
  - ladino: En 2017 Catherine aresivyo una envitasyon de Teheran a vinir i partisipar en la konferensya de los palestinyanos. Khaled Mashal dyo un diskurso muy fuerte kontra Israel en esta konferensya gritando "Muerte a Amerika i muerte a Israel!!". Catherine no kedo debasho. Dyo un diskurso de fuegos i flamas kontra Israel i lo desho a Khaled Mashal detras.
    ebreo: ב- 2017 קטרין קיבלה הזמנה מטהרן לבוא ולהשתתף בוועידה של הפלסטינים. חאלד משעל נתן נאום חזק מאוד נגד ישראל בוועידה זו כשהוא צועק "מוות לאמריקה, מוות לישראל!!". קטרין לא נשארה מתחת. נתנה נאום של אש ולהבות נגד ישראל והותירה את חאלד משעל מאחור.
  - ladino: Esto fue un punto de buelta en la vida de Catherine en sus relasyones kon el rejim de Iran.
    ebreo: זאת הייתה נקודת מפנה בחייה של קטרין היחסים שלה עם המשטר באירן.
  - ladino: De agua repozada ke me guadre el Dyo ke de la fuerte me guadro yo.
    ebreo: ממים שקטים שישמור אותי ה' כי מהסוערים נשמר אני.
